syntax = "proto3";

package ai;

option csharp_namespace = "Ai";

service AIService {
  // Generic AI Search and Process
  rpc ProcessQuery (QueryRequest) returns (QueryResponse);

  // Corporate Research Agent — single company
  rpc AnalyzeCompany (CompanyRequest) returns (CompanyResponse);

  // Company Discovery — list of active companies by country
  rpc DiscoverCompanies (DiscoverRequest) returns (DiscoverResponse);

  // Product Data Extraction
  rpc ExtractProduct (ProductRequest) returns (ProductResponse);
}

message ProductRequest {
  string raw_text = 1;
}

message ProductResponse {
  string nombre_limpio = 1;
  string categoria_sugerida = 2;
  string atributos_json = 3;
}

message QueryRequest {
  string query = 1;
  string instruction = 2;
}

message QueryResponse {
  string answer = 1;
  string raw_data = 2;
}

message CompanyRequest {
  string legal_name = 1;
  string country = 2;
}

message CompanyResponse {
  string legal_name = 1;
  string commercial_name = 2;
  string foundation_date = 3;
  string legal_representative = 4;
  string phones = 5;
  string official_email = 6;
  string ciiu_code = 7;
  double social_capital = 8;
  string registration_status = 9;
  string verified_job_url = 10;
  string official_data_source = 11;
  string country = 12;
  string sector = 13;
  string chamber_of_commerce_status = 14;
}

message DiscoverRequest {
  string country = 1;
  int32 limit = 2;  // e.g. 10, 50, 100
}

message DiscoverResponse {
  repeated CompanyResponse companies = 1;
  int32 total_found = 2;
  string search_source = 3;
}
