name: Frontend CI/CD

on:
  push:
    branches: [ '**' ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, master, dev ]
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364ca9af683 # v4.2.2

      - name: 🛡️ Security Scan (Secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bcfe98bee960ef0a3b2b876413247071607ecbb # v2.0.1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 🛡️ Security Scan (Vulnerable Packages)
        run: bun pm audit

      - name: Lint
        run: bun run lint

      - name: Run Unit Tests
        run: bun run test -- --run # Run vitest in non-watch mode

      - name: Build
        run: bun run build

      # 2026 Best Practice: Using Vercel Action with SHA pinning for CD
      - name: Deploy to Vercel
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: amondnet/vercel-action@bee30f30626a457493a388b17b2b80058b877e68 # v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Deploy to production only on main/master branches
          vercel-args: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && '--prod' || '' }}
          working-directory: frontend
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-project-name: 'invoice-frontend'
