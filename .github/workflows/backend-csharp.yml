name: Backend C# CI/CD

on:
  push:
    branches: [ '**' ]
    paths:
      - 'backend-csharp/**'
      - 'backend-csharp.Tests/**'
      - 'proto/**'
  pull_request:
    branches: [ main, master, dev ]
    paths:
      - 'backend-csharp/**'
      - 'backend-csharp.Tests/**'
      - 'proto/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # Required for OIDC authentication in 2026

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364ca9af683 # v4.2.2

      - name: 🛡️ Security Scan (Secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Don't block whole build for old history, but good for visibility

      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0ad7a039845a0572781ccca26958aed6403 # v4.2.0
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore backend-csharp/backend-csharp.csproj

      - name: Build
        run: dotnet build backend-csharp/backend-csharp.csproj --configuration Release --no-restore

      - name: 🛡️ Security Scan (Vulnerable Packages)
        run: dotnet list backend-csharp/backend-csharp.csproj package --vulnerable --include-transitive

      - name: Test
        run: dotnet test backend-csharp.Tests/backend-csharp.Tests.csproj --configuration Release --no-build --verbosity normal

      # 2026 Best Practice: Workload Identity Federation (Keyless Auth)
      - name: Google Auth
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: google-github-actions/auth@6fc934bc06abc2aeb48229adca9a1c92af4c0fc2 # v2.1.7
        with:
          workload_identity_provider: 'projects/977952175712/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-cd-invoice@launch-490115.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be37a2bb46c # v2.1.1

      - name: Authorize Docker
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push to Artifact Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        run: |
          IMAGE_NAME=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/invoice-repo/backend-csharp:${{ github.sha }}
          docker build -t $IMAGE_NAME -f backend-csharp/Dockerfile .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
        uses: google-github-actions/deploy-cloudrun@48e063c8da84196122d9cb3239e25d25e0e0f316 # v2.2.0
        with:
          # Use different service names for dev and prod
          service: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'backend-csharp' || 'backend-csharp-dev' }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/invoice-repo/backend-csharp:${{ github.sha }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_URL }}
            Jwt__Key=${{ secrets.JWT_KEY }}
            Google__ClientId=${{ secrets.GOOGLE_CLIENT_ID }}
          flags: |
             --min-instances=0
             --max-instances=10
             --memory=512Mi
             --allow-unauthenticated
